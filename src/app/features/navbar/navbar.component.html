<nav class="navbar" [class.scrolled]="isScrolled()" [class.menu-open]="menuOpen()">
      <div class="container navbar-inner">
        <!-- Logo -->
        <a class="navbar-logo" (click)="scrollTo('hero')">
          <span class="logo-bracket">&lt;</span>
          <span class="logo-name">MAS</span>
          <span class="logo-bracket">/&gt;</span>
        </a>

        <!-- Desktop Links -->
        <ul class="navbar-links">
          @for (item of portfolio.navItems; track item.href) {
            <li>
              <a
                class="nav-link"
                [class.active]="scroll.activeSection() === item.href.replace('#', '')"
                (click)="scrollTo(item.href)"
              >{{ item.label }}</a>
            </li>
          }
        </ul>

        <!-- Actions -->
        <div class="navbar-actions">
          <button
            class="theme-toggle"
            (click)="theme.toggle()"
            [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
          >
            @if (theme.isDark()) {
              <span class="toggle-icon">☀️</span>
            } @else {
              <span class="toggle-icon">🌙</span>
            }
          </button>
          <a href="#contact" class="btn-primary nav-cta" (click)="scrollTo('contact')">Hire Me</a>
          <button class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen()" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>

      <!-- Mobile Menu -->
      <div class="mobile-menu" [class.open]="menuOpen()">
        <ul>
          @for (item of portfolio.navItems; track item.href) {
            <li>
              <a
                class="mobile-nav-link"
                [class.active]="scroll.activeSection() === item.href.replace('#', '')"
                (click)="scrollTo(item.href); closeMenu()"
              >{{ item.label }}</a>
            </li>
          }
          <li>
            <a href="mailto:muhmedsakran@gmail.com" class="btn-primary mobile-cta">Hire Me</a>
          </li>
        </ul>
      </div>
    </nav>
